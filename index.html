<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NordPrint Studio — Desk · Home · Custom</title>
<meta name="description" content="NordPrint Studio: 3D-Druck-Dienstleister. Desk, Home und individuelle Sonderanfertigungen.">
<style>
  :root {
    color-scheme: light;
    --paper: #fcfbf8;
    --paper-2: #f4efe6;
    --paper-3: #ede4d4;
    --ink: #0d171c;
    --grey: #6b6b6b;
    --grey-dark: #9a9490;
    --accent: #e2652e;
    --accent-soft: #f4c9a8;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--paper);
    color: var(--ink);
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* ---------- Wave backdrop ---------- */
  .waves {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    width: 100%;
    line-height: 0;
    z-index: 0;
    pointer-events: none;
  }
  .waves svg { display: block; width: 100%; height: auto; }
  .wave-back {
    animation: driftBack 14s ease-in-out infinite;
    transform-origin: 50% 100%;
  }
  .wave-front {
    margin-top: -6%;
    animation: driftFront 10s ease-in-out infinite;
    transform-origin: 50% 100%;
  }
  @keyframes driftBack  { 0%,100% { transform: translateX(0); } 50% { transform: translateX(-2.5%); } }
  @keyframes driftFront { 0%,100% { transform: translateX(0); } 50% { transform: translateX(2.5%); } }

  main, footer { position: relative; z-index: 1; }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 3rem 1.5rem 2rem;
  }

  /* ---------- Logo mark ---------- */
  .emblem {
    width: clamp(150px, 32vw, 210px);
    height: auto;
    margin-bottom: 2.1rem;
    filter: drop-shadow(0 18px 30px rgba(0,0,0,0.45));
    opacity: 0;
    animation: emblemIn 0.5s ease-out 0.05s forwards;
  }
  @keyframes emblemIn {
    from { opacity: 0; transform: scale(0.92); }
    to   { opacity: 1; transform: scale(1); }
  }

  #Pfad   { opacity: 0; transform: translateY(-22px); animation: faceTop 0.55s cubic-bezier(.2,.7,.3,1) 0.35s forwards; }
  #path1  { opacity: 0; transform: translate(-18px,14px); animation: faceLeft 0.55s cubic-bezier(.2,.7,.3,1) 0.45s forwards; }
  #path2  { opacity: 0; transform: translate(18px,14px); animation: faceRight 0.55s cubic-bezier(.2,.7,.3,1) 0.5s forwards; }
  @keyframes faceTop   { to { opacity: 1; transform: translateY(0); } }
  @keyframes faceLeft  { to { opacity: 1; transform: translate(0,0); } }
  @keyframes faceRight { to { opacity: 1; transform: translate(0,0); } }

  #path3, #path4, #path5 {
    opacity: 0;
    animation: shadeIn 0.4s ease-out 0.95s forwards;
  }
  @keyframes shadeIn { to { opacity: 0.5; } }

  #path6, #path7, #path8, #path9 {
    opacity: 0;
    transform-box: fill-box;
  }
  #path6 { transform: scaleY(0); transform-origin: 50% 100%; animation: armY 0.28s ease-out 1.2s forwards; }
  #path7 { transform: scaleY(0); transform-origin: 50% 0%;   animation: armY 0.28s ease-out 2.04s forwards; }
  #path8 { transform: scaleX(0); transform-origin: 100% 50%; animation: armX 0.28s ease-out 2.46s forwards; }
  #path9 { transform: scaleX(0); transform-origin: 0% 50%;   animation: armX 0.28s ease-out 1.62s forwards; }
  @keyframes armY { to { opacity: 1; transform: scaleY(1); } }
  @keyframes armX { to { opacity: 1; transform: scaleX(1); } }

  #path10 {
    transform-box: fill-box;
    transform-origin: 50% 50%;
    opacity: 0;
    animation: nozzle 2s cubic-bezier(.3,.6,.3,1) 0.95s forwards;
  }
  @keyframes nozzle {
    0%   { transform: translate(0,0) scale(0);   opacity: 0; }
    12%  { transform: translate(0,0) scale(1);   opacity: 1; }
    27%  { transform: translate(0,-134px) scale(1.25); opacity: 1; }
    34%  { transform: translate(0,0) scale(1);   opacity: 1; }
    48%  { transform: translate(136px,0) scale(1.25);  opacity: 1; }
    55%  { transform: translate(0,0) scale(1);   opacity: 1; }
    69%  { transform: translate(0,132px) scale(1.25);  opacity: 1; }
    76%  { transform: translate(0,0) scale(1);   opacity: 1; }
    90%  { transform: translate(-136px,0) scale(1.25); opacity: 1; }
    100% { transform: translate(0,0) scale(1);   opacity: 1; }
  }

  #path11 {
    stroke-dasharray: 250;
    stroke-dashoffset: 250;
    animation: dashDraw 0.4s ease-out 2.85s forwards;
  }
  @keyframes dashDraw { to { stroke-dashoffset: 0; } }

  #NORDPRINT, #STUDIO {
    opacity: 0;
    transform: translateY(8px);
  }
  #NORDPRINT { animation: textIn 0.4s ease-out 2.95s forwards; }
  #STUDIO    { animation: textIn 0.4s ease-out 3.05s forwards; }
  @keyframes textIn { to { opacity: 1; transform: translateY(0); } }

  .sr-only {
    position: absolute;
    width: 1px; height: 1px;
    padding: 0; margin: -1px;
    overflow: hidden;
    clip: rect(0,0,0,0);
    white-space: nowrap;
    border: 0;
  }

  /* ---------- Page copy ---------- */
  p.tagline {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--grey);
    font-size: clamp(0.95rem, 2vw, 1.15rem);
    letter-spacing: 0.02em;
    margin: 0 0 1rem;
    opacity: 0;
    transform: translateY(10px);
    animation: riseIn 0.55s ease-out 3.35s forwards;
  }

  .bereiche {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    font-size: 0.78rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--accent);
    margin: 0 0 2.1rem;
    opacity: 0;
    transform: translateY(10px);
    animation: riseIn 0.55s ease-out 3.5s forwards;
  }
  .bereiche .sep { color: var(--accent-soft); font-weight: 400; }

  /* ---------- Instagram (prominent, in-view) ---------- */
  .insta {
    display: inline-flex;
    align-items: center;
    gap: 0.55rem;
    margin: 0 0 1.5rem;
    padding: 0.7rem 1.4rem;
    background: var(--accent);
    color: #fff;
    border-radius: 999px;
    font-size: 1rem;
    font-weight: 600;
    text-decoration: none;
    box-shadow: 0 6px 18px rgba(226,101,46,0.35);
    opacity: 0;
    transform: translateY(10px);
    animation: riseIn 0.55s ease-out 3.6s forwards;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .insta:hover { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(226,101,46,0.45); }
  .insta svg { width: 19px; height: 19px; }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.55rem 1.15rem;
    background: #fff;
    border: 1px solid #e9e1d2;
    border-radius: 999px;
    font-size: 0.85rem;
    color: var(--grey);
    box-shadow: 0 1px 2px rgba(13,23,28,0.05);
    opacity: 0;
    transform: translateY(10px);
    animation: riseIn 0.55s ease-out 3.75s forwards;
  }
  @keyframes riseIn { to { opacity: 1; transform: translateY(0); } }

  .badge .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 1.8s ease-in-out 4.3s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  footer {
    padding: 1.6rem 1rem 2rem;
    text-align: center;
    font-size: 0.85rem;
    color: var(--grey-dark);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: 0.7rem;
    opacity: 0;
    animation: riseIn 0.6s ease-out 3.95s forwards;
  }

  footer a {
    color: var(--grey);
    text-decoration: none;
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    padding: 0.25rem 0.15rem;
    border-bottom: 1px solid transparent;
    transition: border-color 0.15s ease, color 0.15s ease;
  }
  footer a:hover { color: var(--accent); border-color: var(--accent); }
  footer .sep { color: var(--paper-3); }

  @media (prefers-reduced-motion: reduce) {
    .emblem, #Pfad, #path1, #path2, #path3, #path4, #path5,
    #path6, #path7, #path8, #path9, #path10, #path11,
    #NORDPRINT, #STUDIO, p.tagline, .bereiche, .insta, .badge, footer,
    .wave-back, .wave-front {
      animation: none !important;
      opacity: 1 !important;
      transform: none !important;
      stroke-dashoffset: 0 !important;
    }
  }
</style>
</head>
<body>
